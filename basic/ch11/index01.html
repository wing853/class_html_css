<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        /* 박스 크기를 계산하는 기준(기본값은 content-box) */
        box-sizing: content-box;
      }

      .box {
        width: 200px;
        height: 100px;
        background-color: aquamarine;
      }

      /* 주요 속성 padding */
      .box {
        padding: 20px;
      }

      .box {
        border: 10px solid black;
      }

      .box {
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">div 태그 1박스 모델</div>
    <div>div 태그2</div>

    <hr />
    <div>
      <pre>
      요소 크기 계산해보기
      전체 너비 = width + 좌우 패팅 + 좌우 border
      전체 높이 = height + 상하 패딩 + 좌우 border
    </pre
      >
    </div>
  </body>
</html>
