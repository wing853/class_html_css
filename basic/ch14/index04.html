<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        display: flex;
        border: 2px solid green;
        padding: 20px;
      }

      .item {
        width: 200px;
        height: 100px;
        background-color: #e26c52;
        margin: 10px;
        border: 2px solid black;
        border-radius: 10px;
        text-align: center;
        line-height: 100px;
      }

      .item1 {
        flex-shrink: 0;
      }
      .item2 {
        flex-shrink: 1;
      }
      .item3 {
        flex-shrink: 0;
      }
      .item4 {
        flex-shrink: 2;
      }
      .item5 {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1"></div>
      <div class="item item2"></div>
      <div class="item item3"></div>
      <div class="item item4"></div>
      <div class="item item5"></div>
    </div>
  </body>
</html>
