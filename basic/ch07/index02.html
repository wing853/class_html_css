<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      h1 {
        color: red;
      }

      p {
        color: blue;
      }

      div {
        background-color: lightgray;
        border: 1px solid red;
      }
    </style>
  </head>
  <body>
    <h1>안녕하세요</h1>
    <p>첫번째 문단입니다.</p>
    <div>박스 영역입니다</div>
  </body>
</html>
