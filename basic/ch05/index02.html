<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>태그 연습</title>
  </head>
  <body>
    <h2>학생 점수 관리 시스템</h2>
    <p>아래는 학생들의 점수를 정리한 예제입니다</p>
    <hr />
    <table border="1">
      <thead>
        <tr>
          <th>이름</th>
          <th>국어</th>
          <th>수학</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>김민수</td>
          <td>85</td>
          <td>90</td>
        </tr>

        <tr>
          <td>이영희</td>
          <td>92</td>
          <td>88</td>
        </tr>
      </tbody>
    </table>

    <!-- form과 input: 사용자 입력 폼 -->
    <h3>학생 정보 입력</h3>
    <form action="localhost:8080/user/test" method="get">
      <label for="">이름: </label>
      <input type="text" id="name" name="name" placeholder="이름 입력" />
      <br />

      <label for="">국어점수</label>
      <input type="number" id="korean" name="korean" placeholder="국어점수" />
      <br />

      <label for="">수학점수</label>
      <input type="number" id="math" name="math" placeholder="수학점수" />

      <br />
      <button type="submit">서버에 전송</button>
    </form>

    <h5>주의 사항</h5>
    <ul>
      <li>점수는 0~100 사이로 입력</li>
      <li>이름은 필수 입력</li>
    </ul>
  </body>
</html>
