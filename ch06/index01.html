<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시멘틱 예제</title>
  </head>
  <body>
    <!-- 페이지 상단, 로고나 제목 -->
    <header>
      <h1>나의 블로그</h1>
      <p>환영합니다! 다양한 주제를 다룹니다</p>
    </header>

    <!-- 네비게이션 메뉴 -->
    <nav>
      <ul>
        <li><a href="#">홈</a></li>
        <li><a href="#">소개</a></li>
        <li><a href="#">연락처</a></li>
      </ul>
    </nav>

    <!-- 주제별 콘텐츠 구분 -->
    <section>
      <h2>오늘의 포스트</h2>
      <!-- 독립적인 콘텐츠 -->
      <article>
        <h3>HTML 5란</h3>
        <p>HTML5는 웹 표준이다</p>
      </article>

      <article>
        <h3>CSS 배우기</h3>
        <p>CSS는 스타일링을 담당합니다</p>
      </article>
    </section>

    <!-- 부가적인 콘텐츠(사이드바) -->
    <aside>
      <h3>추천링크</h3>
      <p><a href="https://www.naver.com">네이버</a></p>
    </aside>
    <!--페이지 하단, 저작권 정보 사이트 정보  -->
    <footer>
      <p>&copy; 2026 나의 블로그. All right...</p>
    </footer>
  </body>
</html>
