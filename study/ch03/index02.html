<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box-px {
        background-color: #5f82ed;
        color: white;
        margin-bottom: 10px;
        padding: 10px;
        width: 300px;
      }
      .box-percent {
        background-color: #8761eb;
        color: white;
        margin-bottom: 10px;
        padding: 10px;
        width: 50%;
      }
      .box-vh {
        background-color: #93cf96;
        color: white;
        padding: 10px;
        height: 30vh;
      }
    </style>
  </head>
  <body>
    <div class="box-px">width:300px(고정! 창 줄여도 안 변함)</div>
    <div class="box-percent">width: 50%(창 줄이면 같이 줄어듬)</div>
    <div class="box-vh">height:30vh(화면 높이의 30%)</div>
  </body>
</html>
