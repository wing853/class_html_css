<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style2.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="logo">Coupang</h1>
      <div class="search-bar">
        <input type="text" placeholder="찾고 싶은 상품을 검색해 보세요" />
        <button>검색</button>
      </div>
    </header>

    <main class="main">
      <h2 class="section-title">오늘의 추천 상품</h2>
      <div class="card-grid">
        <div class="product-card">
          <span class="badge">로켓배송</span>
          <img src="https://picsum.photos/seed/prod1/250/250" alt="상품1" />
          <h3>무선 블루투스 이어폰</h3>
          <p class="price-original">59,000원</p>
          <p class="price-sale">29,900원 <span>50%</span></p>
          <p>★★★★☆ (128)</p>
          <p>내일도착</p>
        </div>
      </div>
    </main>
  </body>
</html>
