<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 레이아웃 패턴 7가지</title>
    <link rel="stylesheet" href="./css/style2.css" />
  </head>
  <body>
    <!-- 패턴 6: 스티키 푸터
         content-wrapper가 남은 공간 전부 차지 → footer를 맨 아래로 밀어냄
         패턴 1~5, 7을 모두 이 안에 넣어야 함 -->
    <div class="content-wrapper">
      <!-- 패턴 1: 완전 가운데 정렬 -->
      <section class="demo-center">
        <div class="box">패턴 1: 완전 가운데</div>
      </section>

      <!-- 패턴 2: 네비게이션 바 -->
      <nav class="demo-nav">
        <span>Logo</span>
        <div>
          <a href="#">메뉴1</a>
          <a href="#">메뉴2</a>
          <a href="#">메뉴3</a>
        </div>
      </nav>

      <!-- 패턴 3: 카드 그리드 -->
      <section class="demo-grid">
        <div class="card">카드 1</div>
        <div class="card">카드 2</div>
        <div class="card">카드 3</div>
        <div class="card">카드 4</div>
      </section>

      <!-- 패턴 4: 사이드바 + 메인 -->
      <div class="demo-sidebar-layout">
        <aside class="sidebar">사이드바</aside>
        <main class="main">메인 콘텐츠</main>
      </div>

      <!-- 패턴 5: 히어로 섹션 -->
      <section class="demo-hero">
        <h2>히어로 섹션</h2>
      </section>

      <!-- 패턴 7: 반응형 2단 → 1단 -->
      <div class="demo-responsive">
        <div class="col">왼쪽</div>
        <div class="col">오른쪽</div>
      </div>
    </div>
    <!-- /.content-wrapper -->

    <!-- footer는 content-wrapper 밖에 있어야 맨 아래 고정됨 -->
    <footer class="demo-footer">
      © 2025 CSS Layout Patterns. All rights reserved.
    </footer>
  </body>
</html>
