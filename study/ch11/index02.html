<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/sytle02.css" />
  </head>
  <body>
    <header class="gh-header">
      <span class="gh-logo">GitHub</span>
      <input class="gh-search" type="text" placeholder="search" />
    </header>

    <main class="gh-main">
      <aside class="profile">
        <img src="https://picsum.photos/seed/ghprofile/120/120" alt="프로필" />
        <h2>Kim-coding</h2>
        <p><a href="#">@kim-coding</a></p>
        <p>풀스택 개발자를 꿈꾸며 매일 커밋합니다</p>
        <p><strong>42</strong> followers • <strong>18</strong> following</p>
        <div>
          <span class="badge badge-html">HTML</span>
          <span class="badge badge-css">CSS</span>
          <spanc class="badge badge-js">JavaScript</span>
        </div>
      </aside>

      <section class="main-content">
        <h3>잔디밭(Contribution Graph)</h3>
        <div class="grass-grid">
          <div class="grass level-0"></div>
          <div class="grass level-1"></div>
          <div class="grass level-2"></div>
          <div class="grass level-0"></div>
          <div class="grass level-1"></div>

          <div class="grass level-2"></div>
          <div class="grass level-0"></div>
          <div class="grass level-1"></div>
          <div class="grass level-2"></div>
          <div class="grass level-0"></div>

          <div class="grass level-1"></div>
          <div class="grass level-2"></div>
          <div class="grass level-0"></div>
          <div class="grass level-1"></div>
          <div class="grass level-2"></div>
        </div>

        <h3>저장소(Repositories)</h3>
        <div class="repo-card">
          <h4><a href="#">html-css-clone</a></h4>
          <p>HTML/CSS 클론 코딩 프로젝트</p>
          <p><span class="lang-dot lang-html"></span> HTML ★ 112</p>
        </div>

        <div class="repo-card">
          <h4><a href="#">todo-app</a></h4>
          <p>할 일 관리 앱</p>
          <p><span class="lang-dot lang-js"></span> JavaScript ★ 8</p>
        </div>
      </section>
    </main>
  </body>
</html>
