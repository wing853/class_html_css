<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 1. h1 ~ h6: 제목태그, 숫자가 클수록 작아짐 -->
    <h1>큰제목</h1>
    <h3>중간제목</h3>
    <h6>작은제목</h6>

    <!-- 2. p: 문단을 나타냄 -->
    <p>이것은 하나의 문단입니다. 텍스트를 묶어줍니다</p>

    <!-- 3. a: 링크를 생성 href로 목적지를 지정 -->
    <a href="https://www.naver.com/" target="_self">여기를 클릭하세요</a>
    <br />

    <!-- 4. img: 이미지를 삽입, src와 alt는 필수 -->
    <img src="https://picsum.photos/200/300?grayscale" alt="샘플이미지" />

    <!-- 5. div: 콘텐츠를 구획으로 나누는 블록 태그 -->
    <div>
      <p>이 문단은 div안에 있습니다.</p>
      <p>레이아웃을 나눌때 이용합니다.</p>
    </div>

    <!-- 6. ul,li: 순서 없는 목록 -->
    <ol>
      <li>항목1</li>
      <li>항목2</li>
      <li>항목3</li>
    </ol>

    <!-- 7. button: 클릭 가능한 버튼 -->
    <button onclick="alert('클릭 클릭')">나를 눌러봐</button>
  </body>
</html>
